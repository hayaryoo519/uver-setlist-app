services:
  db-local:
    image: postgres:16-alpine
    ports:
      - "54332:5432"
    environment:
      POSTGRES_DB: uver_app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - local_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  local_db_data:
