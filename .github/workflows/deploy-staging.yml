# Forced trigger update for mobile scroll fix
name: Deploy to Staging

on:
  push:
    branches: [dev]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to Staging Server
        run: |
          cd ~/apps/uver-setlist-staging
          git fetch origin dev
          git checkout dev
          git reset --hard origin/dev

          # イメージをビルド
          docker compose build

          # DBマイグレーション（db-staging の healthcheck 完了後に実行）
          docker compose run --rm app-staging node server/scripts/migrate.js

          # サービス起動
          docker compose up -d
