name: Deploy to Production

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Deploy to Production Server
        run: |
          cd ~/apps/uver-setlist-app/server

          # 1. 現在の.envをバックアップ（サーバー固有の設定を守るため）
          cp .env .env.backup

          # 2. 最新コードを強制的に取得
          git fetch origin main
          git reset --hard origin/main

          # 3. バックアップから.envを復元
          cp .env.backup .env

          # 4. バックエンド依存関係のインストール
          npm install

          # 5. DBマイグレーション
          node migrate.js

          # 6. フロントエンドビルド
          cd ~/apps/uver-setlist-app
          npm install
          npm run build

          # 7. サービス再起動
          echo "${{ secrets.SUDO_PASSWORD }}" | sudo -S systemctl restart uver-setlist
